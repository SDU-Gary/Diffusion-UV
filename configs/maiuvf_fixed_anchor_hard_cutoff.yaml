# MA-IUVF Fixed Anchor + Hard Cutoff Configuration
# Configuration matching the best experimental results

experiment:
  name: "fixed_anchor_hard_cutoff"
  description: "Fixed anchor weight + hard classification cutoff (best results)"
  tags: ["best", "production"]
  version: "1.0"

paths:
  input_mesh: "data/models/stanford_bunny_procedural.obj"
  texture: "data/textures/stanford_bunny_procedural_texture.png"
  output_dir: "outputs/maiuvf_fixed_anchor"

baking:
  num_samples: 10000
  chart_mode: "uv_islands"
  use_dynamic_sampling: true
  virtual_epoch_size: 300000
  sigma_ratio: 0.01

training:
  epochs: 100
  batch_size: 8192
  learning_rate: 0.001
  device: "cuda"

model:
  encoder_type: "bspline_hash"
  activation: "silu"
  hidden_dim: 64
  num_layers: 2
  positional_encoding_freqs: 8
  hash_grid:
    learning_rate: 0.001  # Separate hash learning rate
    num_levels: 16
    features_per_level: 2
    log2_size: 19
    base_resolution: 16
    max_resolution: 2048
    cuda_backend: "auto"
    weight_decay: 0.000001
  mlp:
    weight_decay: 0.0

loss:
  weights:
    metric: 0.01
    anchor: 1.0  # Fixed - no decay
    classification: 1.0
    centroid: 0.0
    unified: 0.0
  schedule:
    strategy: "two_stage"
    phase_a_epochs: 30
    ramp: "cosine"
    target_weights:
      metric: 1.0
      anchor: 0.01  # Not used due to keep_anchor_constant
      classification: 0.1
    classification_cutoff:
      epoch: 20
      value: 0.0  # Hard cutoff to zero
    keep_anchor_constant: true  # CRITICAL: No anchor weight decay
    unified:
      num_neighbors: 4
      epsilon: 0.01

dynamic_sampling:
  enabled: true  # CRITICAL: Use GPU dynamic sampling
  virtual_epoch_size: 300000
  sigma_ratio: 0.01

rendering:
  target_faces: 500
  mode: "cpu"
  resolution: 512

system:
  device: "cuda"
  quick_test: false
  seed: 42

# Results from this configuration:
# - Best loss: 0.002395 (72% improvement over baseline)
# - Best classification accuracy: 99.48%
# - Render coverage: 60.28%
# - Chart accuracy: 99.43%
# - Anchor loss rebound: NONE (fixed by constant weight)
