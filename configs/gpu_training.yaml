# =============================================================================
# GPU Training Configuration - Optimized for CUDA
# =============================================================================

# Data Configuration
data:
  high_mesh_path: "data/models/stanford-bunny.obj"
  low_mesh_path: ""
  texture_path: ""
  cache_dir: "./cache/bunny_gpu"
  num_samples_per_epoch: 100000  # Pre-sample all data
  sampling_ratios:
    surface: 0.4
    near_surface: 0.4
    exterior: 0.1
    interior: 0.1
  near_surface_epsilon: 0.01
  lowpass_sigma: 5.0

# Network G: Geometry Network
network_g:
  hidden_dim: 256  # Larger network for GPU
  num_layers: 8
  positional_encoding_freqs: 6
  skip_connection_layer: 4
  include_raw_input: true
  sdf_output_range: 1.0

# Network D: Diffusion Model
network_d:
  condition_dim: 42
  num_diffusion_steps: 1000
  inference_steps: 10
  scheduler_type: "linear"
  hidden_channels: 128
  num_down_layers: 2
  num_res_blocks: 4
  use_film: true
  film_hidden_dim: 256
  use_ema: true  # Enable EMA for GPU training
  ema_decay: 0.9999

# Network R: Reverse Mapping Network
network_r:
  hidden_dim: 128
  num_layers: 3
  num_classes: 32
  positional_encoding_freqs: 4

# Training Configuration
training:
  phase1_epochs: 5  # Short for testing
  phase2_epochs: 2
  phase3_epochs: 2
  batch_size_phase1: 32768  # Large batch for GPU
  batch_size_phase2: 16384
  batch_size_phase3: 8192
  learning_rate_g: 1.0e-3
  learning_rate_d: 1.0e-4
  learning_rate_r: 1.0e-4
  optimizer: "adam"
  weight_decay: 0.0
  gradient_clip_norm: 1.0
  mixed_precision: true  # Enable mixed precision (FP16)
  lambda_sdf: 1.0
  lambda_eikonal: 0.1
  lambda_color_base: 1.0
  lambda_diffusion: 1.0
  lambda_reverse_start: 0.1
  lambda_reverse_end: 0.5
  lambda_entropy_start: 0.0
  lambda_entropy_end: 0.05

# Loss Configuration
loss:
  lambda_sdf: 1.0
  lambda_eikonal: 0.1
  lambda_color_base: 1.0
  lambda_diffusion: 1.0
  lambda_reverse: 0.1
  lambda_entropy: 0.0

# Logging Configuration
logging:
  log_dir: "./logs"
  experiment_name: "bunny_gpu_test"
  use_wandb: false
  use_tensorboard: false
  wandb_project: "diffusion-uv"
  log_interval: 10
  render_interval: 5
  save_interval: 5

# Evaluation Configuration
evaluation:
  eval_interval: 5
  num_render_views: 4
  render_resolution: 256
  output_dir: "./outputs"

# Experiment Settings
seed: 42
device: "cuda"
