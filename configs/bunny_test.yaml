# =============================================================================
# Test Configuration - Stanford Bunny
# =============================================================================

# Data Configuration
data:
  high_mesh_path: "data/models/stanford-bunny.obj"
  low_mesh_path: ""  # Will use same mesh if empty
  texture_path: ""  # Will use procedural texture
  cache_dir: "./cache/bunny"
  num_samples_per_epoch: 100000  # Smaller for testing
  sampling_ratios:
    surface: 0.4
    near_surface: 0.4
    exterior: 0.1
    interior: 0.1
  near_surface_epsilon: 0.01
  lowpass_sigma: 5.0

# Network G: Geometry Network
network_g:
  hidden_dim: 128  # Smaller for testing
  num_layers: 6
  positional_encoding_freqs: 4
  skip_connection_layer: 3
  include_raw_input: true
  sdf_output_range: 1.0

# Network D: Diffusion Model
network_d:
  condition_dim: 42
  num_diffusion_steps: 100
  inference_steps: 10
  scheduler_type: "linear"
  hidden_channels: 32
  num_down_layers: 2
  num_res_blocks: 1
  use_film: true
  film_hidden_dim: 256
  use_ema: false  # Disabled for testing

# Network R: Reverse Mapping Network
network_r:
  hidden_dim: 128
  num_layers: 3
  num_classes: 32
  positional_encoding_freqs: 4

# Training Configuration
training:
  phase1_epochs: 5  # Very short for testing
  phase2_epochs: 2
  phase3_epochs: 2
  batch_size_phase1: 8192
  batch_size_phase2: 4096
  batch_size_phase3: 2048
  learning_rate_g: 1.0e-3
  learning_rate_d: 1.0e-4
  learning_rate_r: 1.0e-4
  optimizer: "adam"
  weight_decay: 0.0
  gradient_clip_norm: 1.0
  mixed_precision: false  # Disabled for testing
  lambda_sdf: 1.0
  lambda_eikonal: 0.1
  lambda_color_base: 1.0
  lambda_diffusion: 1.0
  lambda_reverse_start: 0.1
  lambda_reverse_end: 0.5
  lambda_entropy_start: 0.0
  lambda_entropy_end: 0.05

# Loss Configuration
loss:
  lambda_sdf: 1.0
  lambda_eikonal: 0.1
  lambda_color_base: 1.0
  lambda_diffusion: 1.0
  lambda_reverse: 0.1
  lambda_entropy: 0.0

# Logging Configuration
logging:
  log_dir: "./logs"
  experiment_name: "bunny_test"
  use_wandb: true  # Disabled for testing
  use_tensorboard: false
  wandb_project: "diffusion-uv"
  wandb_mode: "online"
  log_interval: 10
  render_interval: 5
  save_interval: 5

# Evaluation Configuration
evaluation:
  eval_interval: 5
  num_render_views: 4
  render_resolution: 256
  output_dir: "./outputs"

# Experiment Settings
seed: 42
device: "cuda"
